# ******************************************************
# PostgreSQL
# ******************************************************
# Primary relational database for FastAPI, Django, Laravel and AI applications.
services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dev-network

# ******************************************************
# Redis
# ******************************************************
# Cache, queues and AI session storage.
# Redis is a fast, in-memory key-value store that is used as a cache, queue and AI session storage.
# Redis is a great choice for caching frequently accessed data and for storing AI session data.
# Redis is a great choice for queuing background tasks and for storing AI session data.
# Redis is a great choice for storing AI session data.

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "${PGADMIN_PORT}:80"

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    networks:
      - dev-network

#******************************************************
# MySQL
# ******************************************************
# Compatibility testing for applications requiring MySQL.
# MySQL is a relational database management system (RDBMS) that is used as a compatibility testing for applications requiring MySQL.
# MySQL is a great choice for compatibility testing for applications requiring MySQL.
  redis:
    image: redis:8-alpine
    container_name: redis

    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - dev-network

  # ******************************************************
  # MySQL
  # Compatibility testing for applications requiring MySQL.
  # ******************************************************

  mysql:
    image: mysql:8.4

    container_name: mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - dev-network

volumes:
  postgres-data:
    name: postgres-data
  pgadmin-data:
    name: pgadmin-data
  redis-data:
    name: redis-data
  mysql-data:
    name: mysql-data

networks:
  dev-network:
    name: ${NETWORK_NAME}
    driver: bridge

